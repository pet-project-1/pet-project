# main 브랜치에 push 되면 web/ 앱을 Vercel 프로덕션으로 자동 배포한다.
# GitHub↔Vercel 네이티브 연동 대신 CI에서 직접 배포 → 안정적이고 로그 추적 가능.
#
# 사전 준비 (1회):
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#     이름: VERCEL_TOKEN
#     값 : Vercel → Account Settings → Tokens 에서 발급한 토큰
name: Deploy to Vercel (Production)

on:
  push:
    branches: [main]
  workflow_dispatch: # 수동 실행도 허용

# 연속 push 시 이전 배포 작업은 취소
concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  # 프로젝트 식별자 (비밀값 아님 — web/.vercel/project.json 과 동일)
  VERCEL_ORG_ID: team_vfB20AfyVsPk7EwxUavHhKLS
  VERCEL_PROJECT_ID: prj_OhSZdVosmx15Dmkf2BIx1aNrzc2a

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifact to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
